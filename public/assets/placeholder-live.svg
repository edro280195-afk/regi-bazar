<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder de live</title>
  <desc id="desc">Ilustración temporal para reemplazar por una captura o foto real de una transmisión en vivo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdf2f8"/>
      <stop offset="0.55" stop-color="#fff5f7"/>
      <stop offset="1" stop-color="#ede9fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#7c3aed" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="900" height="1200" rx="56" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="215" y="205" width="470" height="790" rx="66" fill="#831843"/>
    <rect x="252" y="270" width="396" height="610" rx="40" fill="#fffaf9"/>
    <circle cx="450" cy="930" r="30" fill="#fbcfe8"/>
    <rect x="292" y="322" width="316" height="240" rx="36" fill="#fce7f3"/>
    <rect x="320" y="606" width="260" height="36" rx="18" fill="#f9a8d4"/>
